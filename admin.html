<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weAnalytics — Админка</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body class="dash-body">

  <div class="dash-layout">
    <aside class="sidebar">
      <div class="sidebar__brand-row">
        <div class="sidebar__brand">
          <span class="sidebar__brand-mark" aria-hidden="true">we</span>
          <span class="sidebar__brand-label">Analytics</span>
        </div>
        <span class="sidebar__brand-tag">Admin</span>
      </div>

      <nav class="sidebar__nav">
        <div class="sidebar__group">
          <a href="#" class="sidebar__link sidebar__link--active" data-admin-page="overview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Обзор
          </a>
          <a href="#" class="sidebar__link" data-admin-page="users">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Пользователи
          </a>
          <a href="#" class="sidebar__link" data-admin-page="invites">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Коды приглашения
          </a>
        </div>
      </nav>

      <div class="sidebar__bottom">
        <div class="sidebar__admin-slot">
          <a href="dashboard.html" class="sidebar__link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Дашборд
          </a>
        </div>
        <div class="sidebar__footer">
          <div class="sidebar__avatar" id="adminAvatar">A</div>
          <div class="sidebar__user-info">
            <div class="sidebar__username" id="adminUsername">—</div>
            <div class="sidebar__plan">Администратор</div>
          </div>
          <div class="sidebar__footer-actions">
            <button type="button" class="sidebar__icon-btn" id="adminLogoutBtn" title="Выйти">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-topbar">
        <div class="dash-topbar__left">
          <span class="dash-page-title" id="adminPageTitle">Обзор</span>
        </div>
        <div class="dash-topbar__right">
          <span class="dash-year-badge">Админ-панель</span>
        </div>
      </div>

      <div class="dash-section">
        <div class="dash-panel" id="panelOverview">
          <div class="stat-row">
            <div class="stat-tile">
              <div class="stat-tile__label">
                <svg class="stat-tile__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                Пользователи
              </div>
              <div class="stat-tile__value" id="statUsers">—</div>
            </div>
            <div class="stat-tile">
              <div class="stat-tile__label">
                <svg class="stat-tile__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
                Серверы
              </div>
              <div class="stat-tile__value" id="statServers">—</div>
            </div>
            <div class="stat-tile">
              <div class="stat-tile__label">
                <svg class="stat-tile__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                События
              </div>
              <div class="stat-tile__value" id="statEvents">—</div>
            </div>
            <div class="stat-tile">
              <div class="stat-tile__label">
                <svg class="stat-tile__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                Донаты всего
              </div>
              <div class="stat-tile__value" id="statDonated">—</div>
            </div>
          </div>
        </div>

        <div class="dash-panel" id="panelUsers" hidden>
          <div class="table-card admin-table">
            <div class="table-card__head">
              <div class="table-card__title">Пользователи</div>
            </div>
            <table class="data-table">
              <thead>
                <tr>
                  <th>Ник</th>
                  <th>Email</th>
                  <th>Серверов</th>
                  <th>Роль</th>
                  <th>Статус</th>
                  <th class="col-actions">Действия</th>
                </tr>
              </thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="dash-panel admin-invites-panel" id="panelInvites" hidden>
          <div class="table-card">
            <div class="table-card__head">
              <div class="table-card__title">Создать код приглашения</div>
            </div>
            <div class="table-card__body">
              <div class="admin-form-row">
                <label class="field">
                  <span class="field__label">Использований</span>
                  <input type="number" id="inviteMaxUses" min="1" max="100" value="1" />
                </label>
                <label class="field">
                  <span class="field__label">Заметка</span>
                  <input type="text" id="inviteNote" placeholder="для кого" autocomplete="off" />
                </label>
              </div>
              <label class="checkbox admin-form-checkbox">
                <input type="checkbox" id="inviteIsAdmin" />
                <span class="checkbox__box"></span>
                <span class="checkbox__text">Новый пользователь будет админом</span>
              </label>
              <button type="button" class="btn btn--primary btn--block admin-form-submit" id="createInviteBtn">Создать код</button>
              <p class="form-error" id="inviteCreateError" hidden></p>
              <p class="admin-success-msg" id="inviteCreatedMsg" hidden></p>
            </div>
          </div>

          <div class="table-card admin-table">
            <div class="table-card__head">
              <div class="table-card__title">Все коды</div>
            </div>
            <table class="data-table">
              <thead>
                <tr>
                  <th>Код</th>
                  <th>Тип</th>
                  <th>Использовано</th>
                  <th>Заметка</th>
                  <th class="col-actions">Действия</th>
                </tr>
              </thead>
              <tbody id="invitesTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/js/admin.js?v=3"></script>
</body>
</html>
